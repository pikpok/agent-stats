name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Swift 6.3.1
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.3.1"

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test

      - name: Build app bundle
        run: ./scripts/build-app.sh
